spring:
  application:
    name: fueledbychai-switchboard
  datasource:
    url: jdbc:h2:file:./data/switchboard-db;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  thymeleaf:
    cache: false

server:
  shutdown: graceful

switchboard:
  broadcast-interval-ms: 100
  history-minutes: 10
  max-rows: 50
  proxy:
    enabled: true
    host: "localhost"
    port: 1080
  broker-refresh-interval-ms: 5000
  security:
    bootstrap-username: admin
    bootstrap-password: ""
  secrets:
    master-key: ""
    master-key-path: ./data/master.key
